name: release

# Tag-driven releases build the binary artifacts (Claude Desktop .mcpb +
# claude.ai skill ZIPs) and attach them to a GitHub Release. Artifacts are
# never committed: Claude's plugin installer rejects repos containing zip
# archives, and the README's stable download links point at
# releases/latest/download/ instead.
#
# Tag must match VERSION / release-contract.json (shared semver train with
# arcadeai-labs/hub — see docs/release-train.md).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag matches VERSION
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION != VERSION file $FILE_VERSION"
            exit 1
          fi

      - name: Structural checks
        run: node scripts/check.mjs

      - name: Build Claude-app skill bundles
        run: node scripts/build-claude-skills.mjs

      - name: Build Claude Desktop extension
        working-directory: clients/claude-desktop/mcpb
        run: npx -y @anthropic-ai/mcpb pack . ../arcade-gateway-hub.mcpb

      - name: Build Claude plugin-directory upload zip
        run: node scripts/build-claude-upload-zip.mjs arcade-claude-plugin-upload.zip

      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          REQUIRES_HUB=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("release-contract.json","utf8")).requires.hub)')
          gh release create "${GITHUB_REF_NAME}" \
            --title "Arcade Agent Hub plugins ${GITHUB_REF_NAME}" \
            --notes "$(cat <<EOF
          Release-train component: **plugin** \`${VERSION}\`

          - Endpoint: \`https://hub.arcade.dev/mcp\`
          - Compatibility: \`requires hub ${REQUIRES_HUB}\` (see \`release-contract.json\`)
          - Coordinated hub releases use the same \`vX.Y.Z\` tag in \`arcadeai-labs/hub\`

          ## Artifacts
          Claude Desktop \`.mcpb\`, skill ZIPs, and Claude plugin-directory upload zip.
          EOF
          )" \
            clients/claude-desktop/arcade-gateway-hub.mcpb \
            clients/claude-desktop/skills/*.zip \
            arcade-claude-plugin-upload.zip
